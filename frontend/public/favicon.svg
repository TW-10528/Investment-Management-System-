<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <!-- Blue background -->
  <rect width="100" height="100" fill="#2735b3"/>

  <!-- Briefcase/Portfolio icon -->
  <!-- Main briefcase body -->
  <rect x="20" y="35" width="60" height="40" rx="3" fill="none" stroke="#ffffff" stroke-width="2.5"/>

  <!-- Briefcase handle -->
  <path d="M 35 35 Q 35 20 50 20 Q 65 20 65 35" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center divider -->
  <line x1="50" y1="35" x2="50" y2="75" stroke="#ffffff" stroke-width="2"/>

  <!-- Left pocket detail -->
  <rect x="25" y="50" width="18" height="15" rx="1" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>

  <!-- Right pocket detail -->
  <rect x="57" y="50" width="18" height="15" rx="1" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>

  <!-- Top accent line (representing documents/funds) -->
  <line x1="25" y1="42" x2="75" y2="42" stroke="#47bfff" stroke-width="2" stroke-linecap="round"/>
</svg>